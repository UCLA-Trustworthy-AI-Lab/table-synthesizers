name: "▶ Edge Case Tests"

on:
  workflow_dispatch:
    inputs:
      model_filter:
        description: 'Run edge cases for a specific model only (e.g. CTGAN)'
        type: string
        required: true

concurrency:
  group: edge-case-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-case-tests:
    name: Edge Case Tests [${{ inputs.model_filter }}]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Sandbox Datasets
        run: python tests/integration/setup_sandbox_datasets.py
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull or build base image
        run: |
          docker pull ghcr.io/ucla-trustworthy-ai-lab/table-synthesizers-base:latest || \
          docker buildx build -f docker/Dockerfile.base \
            -t ghcr.io/ucla-trustworthy-ai-lab/table-synthesizers-base:latest --load .
      - name: Run edge cases in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app ghcr.io/ucla-trustworthy-ai-lab/table-synthesizers-base:latest \
            bash -c "pytest tests/integration/test_edge_cases.py -k '${{ inputs.model_filter }}' -v --tb=short"
