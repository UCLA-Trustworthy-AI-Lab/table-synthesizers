name: "▶ Integration Tests"

on:
  workflow_dispatch:

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Sandbox Datasets
        run: python tests/integration/setup_sandbox_datasets.py
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull or build base image
        run: |
          docker pull ghcr.io/ucla-trustworthy-ai-lab/table-synthesizers-base:latest || \
          docker buildx build -f docker/Dockerfile.base \
            -t ghcr.io/ucla-trustworthy-ai-lab/table-synthesizers-base:latest --load .
      - name: Run integration tests in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app ghcr.io/ucla-trustworthy-ai-lab/table-synthesizers-base:latest \
            bash -c "pytest tests/integration/ --ignore-glob='**/test_edge_cases.py' -v --tb=short"
