name: Run Tests

on:
  push:
    branches: [ main, master, '*_test' ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Tier 1: Base CPU models (Identity, CART, DPCART, SMOTE, AIM)
  # ---------------------------------------------------------------
  test-base:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Install package
      run: pip install -e .

    - name: Run base model tests
      run: |
        pytest tests/ -m "not gpu and not synthcity" \
          --ignore-glob="**/test_arf.py" \
          --ignore-glob="**/test_bayesian_network.py" \
          --ignore-glob="**/test_great.py" \
          --ignore-glob="**/test_nflow.py" \
          --ignore-glob="**/test_smote.py" \
          -v --tb=short

  # ---------------------------------------------------------------
  # Tier 2: GPU/PyTorch models (CPU fallback in CI)
  # ---------------------------------------------------------------
  test-gpu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-gpu.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # CPU torch for CI (no GPU runners); local GPU testing via Docker
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements-gpu.txt
        pip install pytest

    - name: Install package
      run: pip install -e .

    - name: Run GPU model tests (CPU fallback)
      run: |
        pytest tests/ -m "not synthcity" \
          --ignore-glob="**/test_arf.py" \
          --ignore-glob="**/test_bayesian_network.py" \
          --ignore-glob="**/test_great.py" \
          --ignore-glob="**/test_nflow.py" \
          --ignore-glob="**/test_smote.py" \
          -v --tb=short

  # ---------------------------------------------------------------
  # Tier 3: Synthcity models (Python 3.11 only)
  # ---------------------------------------------------------------
  test-synthcity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-synthcity.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements-synthcity.txt
        pip install pytest

    - name: Install package
      run: pip install -e .

    - name: Run synthcity model tests
      run: |
        pytest tests/ -m "synthcity" -v --tb=short
