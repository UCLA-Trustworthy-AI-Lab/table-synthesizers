name: Run Tests

on:
  push:
    branches: [ main, master, '*_test' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      run_gpu:
        description: 'Run GPU model tests (CPU fallback)'
        type: boolean
        default: false
      run_synthcity:
        description: 'Run synthcity model tests'
        type: boolean
        default: false
      run_all:
        description: 'Run all tiers (base + GPU + synthcity)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Tier 1: Base CPU models (Identity, CART, DPCART, SMOTE, AIM)
  # Always runs on push, PR, and manual dispatch
  # ---------------------------------------------------------------
  test-base:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "requirements*.txt"

    - name: Install dependencies
      run: |
        uv pip install --system -r requirements.txt
        uv pip install --system pytest

    - name: Install package
      run: uv pip install --system -e .

    - name: Run base model tests
      run: |
        pytest tests/ -m "not gpu and not synthcity and not edge_synthcity and not edge_gpu" \
          --ignore-glob="**/test_arf.py" \
          --ignore-glob="**/test_bayesian_network.py" \
          --ignore-glob="**/test_great.py" \
          --ignore-glob="**/test_nflow.py" \
          --ignore-glob="**/test_smote.py" \
          -v --tb=short

  # ---------------------------------------------------------------
  # Tier 2: GPU/PyTorch models (CPU fallback in CI)
  # Manual only -- trigger via Actions > Run workflow > check "Run GPU"
  # ---------------------------------------------------------------
  test-gpu:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.run_gpu == 'true' || github.event.inputs.run_all == 'true')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "requirements*.txt"

    - name: Install dependencies
      run: |
        uv pip install --system -r requirements.txt
        # CPU torch for CI (no GPU runners); local GPU testing via Docker
        uv pip install --system torch torchvision --index-url https://download.pytorch.org/whl/cpu
        uv pip install --system -r requirements-gpu.txt
        uv pip install --system pytest

    - name: Install package
      run: uv pip install --system -e .

    - name: Run GPU model tests (CPU fallback)
      run: |
        pytest tests/ -m "not synthcity and not edge_synthcity" \
          --ignore-glob="**/test_arf.py" \
          --ignore-glob="**/test_bayesian_network.py" \
          --ignore-glob="**/test_great.py" \
          --ignore-glob="**/test_nflow.py" \
          --ignore-glob="**/test_smote.py" \
          -v --tb=short

  # ---------------------------------------------------------------
  # Tier 3: Synthcity models (Python 3.11 only)
  # Manual only -- trigger via Actions > Run workflow > check "Run synthcity"
  # ---------------------------------------------------------------
  test-synthcity:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.run_synthcity == 'true' || github.event.inputs.run_all == 'true')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "requirements*.txt"

    - name: Install dependencies
      run: |
        uv pip install --system -r requirements.txt
        uv pip install --system torch --index-url https://download.pytorch.org/whl/cpu
        uv pip install --system -r requirements-synthcity.txt
        uv pip install --system pytest

    - name: Install package
      run: uv pip install --system -e .

    - name: Run synthcity model tests
      run: |
        pytest tests/ -m "synthcity or edge_synthcity" -v --tb=short
