name: "📦 Publish Images to GHCR"

# Auto-publish on merge to main, or manually trigger a push
on:
  push:
    branches: [main, master]
    paths:
      - 'docker/Dockerfile.*'
      - '.dockerignore'
      - 'requirements*'
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Additional image tag (e.g. v1.0.0). "latest" and SHA are always added.'
        type: string
        default: ''

concurrency:
  group: publish-images
  cancel-in-progress: false   # Never cancel a publish mid-push

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.tier }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to GHCR
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - tier: base
            dockerfile: docker/Dockerfile.base
            image: ghcr.io/ohsono/table-synthesizers-base
          - tier: gpu
            dockerfile: docker/Dockerfile.gpu
            image: ghcr.io/ohsono/table-synthesizers-gpu
          - tier: synthcity
            dockerfile: docker/Dockerfile.synthcity
            image: ghcr.io/ohsono/table-synthesizers-synthcity

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.tier }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tier }}

      - name: Image digest
        run: echo "Pushed ${{ matrix.image }} → ${{ steps.build-and-push.outputs.digest }}"
