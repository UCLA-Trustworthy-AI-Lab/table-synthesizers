name: "▶ Docker Build (manual only)"

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Which Docker image to build'
        type: choice
        options: ['base', 'synthcity', 'both']
        default: 'base'
      run_tests:
        description: 'Run tests inside the container after build'
        type: boolean
        default: true

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker Build (${{ matrix.tier }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{
            fromJson(
              inputs.tier == 'both'  && '[{"tier":"base","dockerfile":"docker/Dockerfile.base","image":"table-synthesizers-base"},{"tier":"synthcity","dockerfile":"docker/Dockerfile.synthcity","image":"table-synthesizers-synthcity"}]' ||
              inputs.tier == 'base'  && '[{"tier":"base","dockerfile":"docker/Dockerfile.base","image":"table-synthesizers-base"}]' ||
              '[{"tier":"synthcity","dockerfile":"docker/Dockerfile.synthcity","image":"table-synthesizers-synthcity"}]'
            )
          }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.tier }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tier }}

      - name: Run tests inside container
        if: inputs.run_tests == true
        run: docker run --rm ${{ matrix.image }}:ci

  gpu-tests:
    name: GPU Tests (CPU Fallback)
    runs-on: ubuntu-latest
    needs: docker-build
    if: inputs.tier == 'base'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"
      - run: |
          uv pip install --system -r requirements.txt
          uv pip install --system torch torchvision --index-url https://download.pytorch.org/whl/cpu
          uv pip install --system -r requirements-gpu.txt
          uv pip install --system pytest
          uv pip install --system -e .
      - run: |
          pytest tests/ -m "not synthcity" \
            --ignore-glob="**/test_arf.py" \
            --ignore-glob="**/test_bayesian_network.py" \
            --ignore-glob="**/test_great.py" \
            --ignore-glob="**/test_nflow.py" \
            --ignore-glob="**/test_smote.py" \
            -v --tb=short
