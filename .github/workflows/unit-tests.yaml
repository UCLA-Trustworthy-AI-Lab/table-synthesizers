name: "▶ Unit Tests"

# Trigger manually from Actions tab – independent of other stages.
# Also used by ci-cd.yaml on push/PR automatically.
on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version'
        type: choice
        options: ['3.11', '3.12', 'both']
        default: '3.11'
      changed_only:
        description: 'Test changed models only (vs main)'
        type: boolean
        default: false

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: >-
          ${{
            fromJson(
              inputs.python_version == 'both' && '["3.11","3.12"]' ||
              format('["{0}"]', inputs.python_version)
            )
          }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest
          uv pip install --system -e .

      - name: Run targeted unit tests (changed models only)
        if: inputs.changed_only == true
        run: python tests/run_changed_models.py origin/main

      - name: Run full unit tests
        if: inputs.changed_only != true
        run: |
          pytest tests/unit/ \
            --ignore-glob="**/test_arf.py" \
            --ignore-glob="**/test_bayesian_network.py" \
            --ignore-glob="**/test_great.py" \
            --ignore-glob="**/test_nflow.py" \
            --ignore-glob="**/test_smote.py" \
            -v --tb=short
