name: "📦 Publish Base Image to GHCR"

# Auto-publish on merge to main, or manually trigger a push
on:
  push:
    branches: [main, master]
    paths:
      - 'docker/Dockerfile.base'
      - 'requirements.txt'
      - 'requirements-base.txt'
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Additional image tag (e.g. v1.0.0). "latest" and SHA are always added.'
        type: string
        default: ''

concurrency:
  group: publish-base-image
  cancel-in-progress: false   # Never cancel a publish mid-push

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.actor }}/table-synthesizers-base

jobs:
  build-and-push:
    name: Build & Push Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE }} → ${{ steps.build-and-push.outputs.digest }}"
