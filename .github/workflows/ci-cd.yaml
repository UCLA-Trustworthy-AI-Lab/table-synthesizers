name: CI/CD Pipeline

# ═══════════════════════════════════════════════════════════
# AUTO TRIGGERS ONLY – push and pull_request
# For manual individual stage runs, use the dedicated workflows:
#   → Actions > "Unit Tests" (push only)
#   → Actions > "Integration Tests" (PR only)
#   → Actions > "Edge Case Tests" (PR only)
#   → Actions > "GPU Tests" (PR only)
# ═══════════════════════════════════════════════════════════

on:
  push:
    branches: [ main, master, '*_test' ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Detect which models/files changed
  # ─────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      models_changed: ${{ steps.detect.outputs.models_changed }}
      docker_changed: ${{ steps.detect.outputs.docker_changed }}
      has_model_changes: ${{ steps.detect.outputs.has_model_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed models and Docker files
        id: detect
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi

          CHANGED=$(git diff --name-only "$BASE_REF" HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          MODELS=$(echo "$CHANGED" | grep '^src/stg/' | cut -d'/' -f3 | sort -u | tr '\n' ',' | sed 's/,$//')
          HAS_MODELS=$([ -n "$MODELS" ] && echo "true" || echo "false")

          DOCKER_CHANGED=$(echo "$CHANGED" | grep -E '^(docker/|requirements|\.dockerignore)' | wc -l)
          HAS_DOCKER=$([ "$DOCKER_CHANGED" -gt "0" ] && echo "true" || echo "false")

          echo "models_changed=$MODELS" >> $GITHUB_OUTPUT
          echo "has_model_changes=$HAS_MODELS" >> $GITHUB_OUTPUT
          echo "docker_changed=$HAS_DOCKER" >> $GITHUB_OUTPUT
          echo "Models changed: $MODELS | Docker changed: $HAS_DOCKER"

  # ─────────────────────────────────────────────────────────────
  # 2. Unit tests
  #    push   → changed models only
  #    PR     → full suite
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && needs.detect-changes.outputs.has_model_changes == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run targeted unit tests in Docker (push)
        if: github.event_name == 'push'
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app \
            -e CHANGED_MODELS="${{ needs.detect-changes.outputs.models_changed }}" \
            ghcr.io/ohsono/table-synthesizers-base:latest \
            bash -c "python tests/run_changed_models.py"
      - name: Run full unit tests in Docker (PR)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app ghcr.io/ohsono/table-synthesizers-base:latest \
            bash -c "pytest tests/unit/ \
              --ignore-glob='**/test_arf.py' \
              --ignore-glob='**/test_bayesian_network.py' \
              --ignore-glob='**/test_great.py' \
              --ignore-glob='**/test_nflow.py' \
              --ignore-glob='**/test_smote.py' \
              -v --tb=short"

  # ─────────────────────────────────────────────────────────────
  # 3. Integration tests (PR only)
  # ─────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Sandbox Datasets
        run: python tests/integration/setup_sandbox_datasets.py
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run integration tests in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app ghcr.io/ohsono/table-synthesizers-base:latest \
            bash -c "pytest tests/integration/ --ignore-glob='**/test_edge_cases.py' -v --tb=short"

  # ─────────────────────────────────────────────────────────────
  # 4. Edge case tests (PR only)
  # ─────────────────────────────────────────────────────────────
  edge-case-tests:
    name: Edge Case Tests
    needs: integration-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Sandbox Datasets
        run: python tests/integration/setup_sandbox_datasets.py
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run edge case tests in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app ghcr.io/ohsono/table-synthesizers-base:latest \
            bash -c "pytest tests/integration/test_edge_cases.py -v --tb=short"

  # ─────────────────────────────────────────────────────────────
  # 5. GPU tests (PR only, CPU fallback)
  # ─────────────────────────────────────────────────────────────
  gpu-tests:
    name: GPU Tests (CPU Fallback)
    needs: unit-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Sandbox Datasets
        run: python tests/integration/setup_sandbox_datasets.py
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GPU tests in Docker (CPU Fallback)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app ghcr.io/ohsono/table-synthesizers-gpu:latest \
            bash -c "pytest tests/ -m 'not synthcity' \
              --ignore-glob='**/test_arf.py' \
              --ignore-glob='**/test_bayesian_network.py' \
              --ignore-glob='**/test_great.py' \
              --ignore-glob='**/test_nflow.py' \
              --ignore-glob='**/test_smote.py' \
              -v --tb=short"
