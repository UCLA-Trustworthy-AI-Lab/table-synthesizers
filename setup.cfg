[metadata]
name = stg
version = 0.0.1
description = A library for synthetic table generation
author = UCLA Trustworthy AI Lab
license = MIT
url = https://github.com/ucla-trustworthy-ai-synthdata/lddp-optimus
classifiers =
    Programming Language :: Python :: 3
    License :: OSI Approved :: MIT License
long_description = file: README.md
long_description_content_type = text/markdown

[options]
package_dir =
    = src
packages = find:
python_requires = >=3.8
install_requires =
    numpy
    pandas
    torch
    tomli
    libzero==0.0.8

[options.packages.find]
where = src

[options.extras_require]
dev =
    pytest
    tqdm
    sklearn
