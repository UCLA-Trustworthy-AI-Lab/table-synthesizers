site_name: table-synthesizers
site_description: Unified synthetic tabular data generation — 16 models, one interface.
repo_url: https://github.com/UCLA-Trustworthy-AI-Lab/table-synthesizers

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            members_order: source
            separate_signature: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - Development Guide: CLAUDE.md
  - API Reference:
      - BaseSynthesizer: api/base.md
      - TableSynthesizer: api/table_synthesizer.md

# docs/README.md is a GitHub-facing doc index (relative links resolve on GitHub,
# not within the mkdocs site); index.md is the mkdocs homepage instead.
exclude_docs: |
  README.md
